<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="480" height="140">
    <!--
    LAPSTORE - Hex Monogram Logo
    Cần load font: Russo One + Rajdhani từ Google Fonts khi nhúng web:
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
  -->
    <defs>
        <linearGradient id="hexGlow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00F0FF" />
            <stop offset="100%" stop-color="#00B8C4" />
        </linearGradient>
    </defs>

    <!-- Hex Monogram Icon -->
    <g transform="translate(10, 14)">
        <!-- Outer hex (cyan) -->
        <path d="M56 3 L104 31 L104 83 L56 111 L8 83 L8 31 Z" fill="none" stroke="#00F0FF" stroke-width="3"
            stroke-linejoin="round" />
        <!-- Inner hex (purple, faded) -->
        <path d="M56 16 L92 37 L92 77 L56 98 L20 77 L20 37 Z" fill="none" stroke="#B026FF" stroke-width="2"
            opacity="0.7" stroke-linejoin="round" />
        <!-- LS text -->
        <text x="56" y="74" text-anchor="middle" font-family="'Russo One', sans-serif" font-size="40" font-weight="900"
            fill="#FFFFFF" letter-spacing="1">LS</text>
    </g>

    <!-- Wordmark -->
    <g transform="translate(135, 0)">
        <text x="0" y="68" font-family="'Russo One', sans-serif" font-size="44" fill="#FFFFFF"
            letter-spacing="6">LAPSTORE</text>
        <text x="2" y="98" font-family="'Rajdhani', sans-serif" font-size="14" font-weight="500" fill="#00F0FF"
            letter-spacing="12">GAMING GEAR</text>
    </g>
</svg>